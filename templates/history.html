{% extends "base.html" %}
{% block title %}History — KnapsackLab{% endblock %}

{% block content %}

<div class="page-header">
  <h1 class="page-title">Problem History</h1>
  <p class="page-subtitle">Previously saved knapsack problems — load any to review its solution.</p>
</div>

<div class="card">
  <div id="history-content">
    <!-- History table will be loaded here -->
    <div style="display:flex; align-items:center; justify-content:center; flex-direction:column; gap:var(--sp-4); padding:var(--sp-12); color:var(--text-muted);">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" opacity="0.3">
        <path d="M3 3h6l2 2h10a2 2 0 0 1 2 2v11a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/>
      </svg>
      <p style="font-size:.9rem;">Loading history...</p>
    </div>
  </div>
</div>

<!-- Detail modal -->
<div id="detail-modal" class="hidden" style="
  position:fixed; inset:0; z-index:200;
  background:rgba(7,8,13,.85);
  backdrop-filter:blur(8px);
  display:flex; align-items:center; justify-content:center;
  padding:var(--sp-6);
">
  <div style="
    background:var(--bg-surface);
    border:1px solid var(--border);
    border-radius:var(--r-xl);
    width:100%; max-width:640px;
    max-height:80vh;
    overflow-y:auto;
  ">
    <div style="padding:var(--sp-5) var(--sp-6); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between;">
      <span style="font-weight:600; font-size:.95rem;" id="modal-title">Problem Detail</span>
      <button id="modal-close" class="btn btn-ghost btn-sm">✕ Close</button>
    </div>
    <div id="modal-body" style="padding:var(--sp-6);">
      <!-- populated by JS -->
    </div>
  </div>
</div>

{% endblock %}

{% block extra_scripts %}
<script>
document.addEventListener('DOMContentLoaded', () => {
  loadHistory();

  // Refresh history when page becomes visible (in case user saved something)
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) {
      loadHistory();
    }
  });
});

async function loadHistory() {
  try {
    const res = await fetch('/api/history');
    if (!res.ok) {
      throw new Error('Failed to load history');
    }
    const problems = await res.json();
    renderHistory(problems);
  } catch (err) {
    console.error('History load error:', err);
    document.getElementById('history-content').innerHTML = `
      <div style="display:flex; align-items:center; justify-content:center; flex-direction:column; gap:var(--sp-4); padding:var(--sp-12); color:var(--text-muted);">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" opacity="0.3">
          <path d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L3.732 16.5c-.77.833.192 2.5 1.732 2.5z"/>
        </svg>
        <p style="font-size:.9rem;">Failed to load history.</p>
        <button onclick="loadHistory()" class="btn btn-secondary btn-sm">Retry</button>
      </div>
    `;
  }
}

function renderHistory(problems) {
  if (problems.length === 0) {
    document.getElementById('history-content').innerHTML = `
      <div style="display:flex; align-items:center; justify-content:center; flex-direction:column; gap:var(--sp-4); padding:var(--sp-12); color:var(--text-muted);">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" opacity="0.3">
          <path d="M3 3h6l2 2h10a2 2 0 0 1 2 2v11a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/>
        </svg>
        <p style="font-size:.9rem;">No saved problems yet.</p>
        <a href="/" class="btn btn-secondary btn-sm">← Go to Solver</a>
      </div>
    `;
    return;
  }

  const tableHtml = `
    <div style="overflow-x:auto;">
      <table class="history-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Items</th>
            <th>Capacity</th>
            <th>Saved</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          ${problems.map(p => `
            <tr>
              <td class="mono text-muted" style="font-size:.75rem">${p.id}</td>
              <td style="font-weight:500;">${escHtml(p.name)}</td>
              <td>
                <span style="display:inline-flex; align-items:center; gap:6px; font-family:var(--font-mono); font-size:.8rem;">
                  <span style="width:8px;height:8px;border-radius:50%;background:var(--accent);display:inline-block;opacity:.6"></span>
                  ${p.item_count} items
                </span>
              </td>
              <td class="mono" style="font-size:.82rem;">${p.capacity}</td>
              <td style="color:var(--text-secondary); font-size:.82rem;">
                ${p.created_at.replace('T', ' ')}
              </td>
              <td>
                <div style="display:flex; gap:var(--sp-2);">
                  <button
                    class="btn btn-secondary btn-sm load-btn"
                    data-id="${p.id}"
                  >
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.51"/>
                    </svg>
                    Load
                  </button>
                  <button
                    class="btn btn-danger btn-sm del-btn"
                    data-id="${p.id}"
                  >
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/>
                    </svg>
                  </button>
                </div>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;

  document.getElementById('history-content').innerHTML = tableHtml;

  // Re-attach event listeners
  attachHistoryEventListeners();
}

function attachHistoryEventListeners() {
  // Delete
  document.querySelectorAll('.del-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (!confirm('Delete this problem?')) return;
      const id  = btn.dataset.id;
      const res = await fetch(`/api/history/${id}`, { method: 'DELETE' });
      if (res.ok) {
        btn.closest('tr').remove();
        toast('Deleted.', 'success');
        // Refresh the history count
        loadHistory();
      } else {
        toast('Delete failed.', 'error');
      }
    });
  });

  // Load detail
  document.querySelectorAll('.load-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      const id  = btn.dataset.id;
      const res = await fetch(`/api/history/${id}`);
      if (!res.ok) { toast('Failed to load.', 'error'); return; }
      const data = await res.json();
      showModal(data);
    });
  });
}
        btn.closest('tr').remove();
        toast('Deleted.', 'success');
      } else {
        toast('Delete failed.', 'error');
      }
    });
  });

  // Load detail
  document.querySelectorAll('.load-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      const id  = btn.dataset.id;
      const res = await fetch(`/api/history/${id}`);
      if (!res.ok) { toast('Failed to load.', 'error'); return; }
      const data = await res.json();
      showModal(data);
    });
  });

  document.getElementById('modal-close').addEventListener('click', () => {
    document.getElementById('detail-modal').classList.add('hidden');
  });

  document.getElementById('detail-modal').addEventListener('click', e => {
    if (e.target === e.currentTarget)
      e.currentTarget.classList.add('hidden');
  });
}

function showModal(data) {
  document.getElementById('modal-title').textContent = data.name;

  const dp = data.dp_result;
  const g  = data.greedy_result;

  const itemsHtml = data.items.map((it, i) =>
    `<tr>
      <td style="color:var(--text-muted);font-family:var(--font-mono);font-size:.72rem">${i+1}</td>
      <td>${escHtml(it.name)}</td>
      <td style="font-family:var(--font-mono)">${it.weight}</td>
      <td style="font-family:var(--font-mono)">${it.value}</td>
    </tr>`
  ).join('');

  document.getElementById('modal-body').innerHTML = `
    <div style="margin-bottom:var(--sp-5);">
      <div style="font-size:.72rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text-muted); margin-bottom:var(--sp-3);">Items (capacity: ${data.capacity})</div>
      <table style="width:100%; border-collapse:collapse; font-size:.85rem;">
        <thead>
          <tr style="border-bottom:1px solid var(--border);">
            <th style="text-align:left; padding:6px 8px; color:var(--text-secondary); font-size:.72rem;">#</th>
            <th style="text-align:left; padding:6px 8px; color:var(--text-secondary); font-size:.72rem;">Name</th>
            <th style="text-align:left; padding:6px 8px; color:var(--text-secondary); font-size:.72rem;">W</th>
            <th style="text-align:left; padding:6px 8px; color:var(--text-secondary); font-size:.72rem;">V</th>
          </tr>
        </thead>
        <tbody>${itemsHtml}</tbody>
      </table>
    </div>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:var(--sp-4);">
      <div style="padding:var(--sp-4); background:rgba(0,212,255,.06); border:1px solid rgba(0,212,255,.2); border-radius:var(--r-md);">
        <div style="font-size:.72rem; color:var(--cyan); font-weight:600; margin-bottom:var(--sp-2);">DP (Optimal)</div>
        <div style="font-family:var(--font-mono); font-size:1.5rem; color:var(--text-primary); margin-bottom:var(--sp-1)">${dp.optimal_value}</div>
        <div style="font-size:.75rem; color:var(--text-muted)">Weight: ${dp.total_weight}/${data.capacity}</div>
        <div style="font-size:.75rem; color:var(--text-muted)">Items: ${dp.selected.length}</div>
      </div>
      <div style="padding:var(--sp-4); background:rgba(255,184,0,.06); border:1px solid rgba(255,184,0,.2); border-radius:var(--r-md);">
        <div style="font-size:.72rem; color:var(--amber); font-weight:600; margin-bottom:var(--sp-2);">Best Greedy (Ratio)</div>
        <div style="font-family:var(--font-mono); font-size:1.5rem; color:var(--text-primary); margin-bottom:var(--sp-1)">${
          g.ratio?.optimal_value ?? g?.optimal_value ?? '—'
        }</div>
        <div style="font-size:.75rem; color:var(--text-muted)">
          Efficiency: ${dp.optimal_value > 0
            ? Math.round((g.ratio?.optimal_value ?? 0) / dp.optimal_value * 100)
            : 100}%
        </div>
      </div>
    </div>`;

  document.getElementById('detail-modal').classList.remove('hidden');
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
{% endblock %}

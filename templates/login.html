<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — KnapsackLab</title>

  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='img/favicon.svg') }}" />

  <!-- Prevent FOUC -->
  <script>
    (function () {
      const saved = localStorage.getItem('knapsack-theme') || 'system';
      const light = saved === 'light' || (saved === 'system' && window.matchMedia('(prefers-color-scheme: light)').matches);
      document.documentElement.setAttribute('data-theme', light ? 'light' : 'dark');
    })();
  </script>

  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}" />
  <script src="{{ url_for('static', filename='js/theme.js') }}" defer></script>

  <style>
    /* Extra atmospheric styles for the login page */
    .login-page::before {
      content  : '';
      position : fixed;
      inset    : 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(0,212,255,0.05) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(167,139,250,0.04) 0%, transparent 45%);
      pointer-events: none;
    }
  </style>
</head>
<body>
<div style="position:fixed;top:16px;right:16px;z-index:100;">
  <div class="theme-toggle">
    <button class="theme-btn" data-theme="dark"   title="Dark">🌙</button>
    <button class="theme-btn" data-theme="light"  title="Light">☀️</button>
    <button class="theme-btn" data-theme="system" title="System">💻</button>
  </div>
</div>

<div class="login-page">
  <div class="login-card">

    <div class="login-logo">
      <!-- Large version of the knapsack icon -->
      <svg class="login-logo-icon" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="56" height="56" rx="14" fill="var(--bg-elevated)"/>
        <rect x="1" y="1" width="54" height="54" rx="13" stroke="var(--border)" stroke-width="1"/>
        <rect x="12" y="26" width="32" height="20" rx="5" fill="none" stroke="var(--accent)" stroke-width="2"/>
        <path d="M12 32 Q12 22 28 22 Q44 22 44 32" stroke="var(--accent)" stroke-width="2" fill="none"/>
        <path d="M21 26 L21 16 Q21 11 28 11 Q35 11 35 16 L35 26"
              stroke="var(--cyan-dim)" stroke-width="1.8" fill="none" stroke-dasharray="3 2"/>
        <circle cx="22" cy="34" r="2" fill="var(--accent)" opacity="0.7"/>
        <circle cx="28" cy="34" r="2" fill="var(--accent)" opacity="0.7"/>
        <circle cx="34" cy="34" r="2" fill="var(--accent)" opacity="0.7"/>
        <circle cx="22" cy="40" r="2" fill="var(--accent)" opacity="0.4"/>
        <circle cx="28" cy="40" r="2" fill="var(--accent)" opacity="0.4"/>
        <circle cx="34" cy="40" r="2" fill="var(--accent)" opacity="0.4"/>
      </svg>

      <span class="login-title">KnapsackLab</span>
      <span class="login-subtitle">
        0/1 Knapsack · Greedy vs DP Comparison<br/>
        Data Analysis of Algorithms
      </span>
    </div>

    {% if error %}
    <div class="error-msg">⚠ {{ error }}</div>
    {% endif %}

    <form method="POST" action="/login" style="display:flex; flex-direction:column; gap:var(--sp-4);">
      <div class="form-group">
        <label class="form-label" for="password">Access Password</label>
        <input
          class="form-input"
          type="password"
          id="password"
          name="password"
          placeholder="Enter password…"
          autofocus
          autocomplete="current-password"
          required
        />
      </div>

      <button type="submit" class="btn btn-primary btn-lg w-full">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        Enter Lab
      </button>
    </form>

    <p style="text-align:center; margin-top:var(--sp-6); font-size:0.72rem; color:var(--text-muted);">
      Press Enter to submit &nbsp;·&nbsp; A course project by Niveditha
    </p>
  </div>
</div>
</body>
</html>
